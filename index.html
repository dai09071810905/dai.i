<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>国会議員 SSL / GlobalSign 調査</title>

<style>

:root{
  --bg:#eef4fb;
  --card:#ffffff;
  --line:#dbe4ee;
  --text:#111827;
  --sub:#6b7280;
  --blue:#2563eb;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:24px;
  background:
    linear-gradient(
      180deg,
      #eef5ff 0%,
      #f7f9fc 100%
    );
  color:var(--text);
  font-family:
    system-ui,
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    sans-serif;
}

.container{
  max-width:1600px;
  margin:auto;
}

h1{
  font-size:38px;
  margin-bottom:8px;
  font-weight:900;
}

.description{
  color:var(--sub);
  line-height:1.9;
  margin-bottom:34px;
  font-size:15px;
}

.summary{
  display:grid;
  grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));
  gap:18px;
  margin-bottom:44px;
}

.card{
  background:#fff;
  border-radius:24px;
  padding:24px;
  border-top:6px solid var(--blue);
  box-shadow:
    0 2px 8px rgba(0,0,0,0.04),
    0 20px 40px rgba(0,0,0,0.04);
}

.card-label{
  color:var(--sub);
  font-size:13px;
  font-weight:700;
}

.card-value{
  font-size:42px;
  font-weight:900;
  margin-top:12px;
}

.card-sub{
  margin-top:10px;
  font-size:13px;
  color:var(--sub);
  line-height:1.6;
}

.section{
  margin-top:48px;
}

.section h2{
  margin-bottom:16px;
  font-size:26px;
  font-weight:900;
}

.table-wrap{
  overflow:auto;
  border-radius:24px;
  background:#fff;
  box-shadow:
    0 2px 8px rgba(0,0,0,0.04),
    0 20px 40px rgba(0,0,0,0.04);
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  position:sticky;
  top:0;
  background:#f8fafc;
  padding:15px;
  text-align:left;
  font-size:13px;
  font-weight:800;
  border-bottom:1px solid var(--line);
  white-space:nowrap;
}

td{
  padding:14px 15px;
  border-bottom:1px solid #eef2f7;
  font-size:14px;
}

tr:nth-child(even){
  background:#fbfdff;
}

tr:hover{
  background:#edf5ff;
}

a{
  color:var(--blue);
  text-decoration:none;
  font-weight:600;
}

a:hover{
  text-decoration:underline;
}

.badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border-radius:999px;
  padding:5px 11px;
  font-size:12px;
  font-weight:800;
}

.yes{
  background:#dcfce7;
  color:#166534;
}

.no{
  background:#fee2e2;
  color:#991b1b;
}

.highlight{
  color:var(--blue);
  font-weight:900;
}

.controls{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

input,
select{
  border:1px solid var(--line);
  border-radius:14px;
  padding:11px 14px;
  background:#fff;
  font-size:14px;
}

input{
  min-width:280px;
}

button{
  border:none;
  border-radius:14px;
  padding:11px 20px;
  background:var(--blue);
  color:#fff;
  font-weight:800;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  opacity:0.92;
  transform:translateY(-1px);
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

.party-badge{
  display:inline-flex;
  align-items:center;
  border-radius:999px;
  padding:5px 10px;
  font-size:12px;
  font-weight:800;
}

.party-自民{ background:#dbeafe; color:#1d4ed8; }
.party-国民{ background:#fef3c7; color:#92400e; }
.party-立憲{ background:#ede9fe; color:#6d28d9; }
.party-れ新{ background:#fee2e2; color:#b91c1c; }
.party-維新{ background:#dcfce7; color:#15803d; }
.party-公明{ background:#e0e7ff; color:#3730a3; }
.party-共産{ background:#ffe4e6; color:#be123c; }
.party-参政{ background:#ffedd5; color:#c2410c; }
.party-社民{ background:#fce7f3; color:#be185d; }
.party-保守{ background:#ede9fe; color:#5b21b6; }
.party-みらい{ background:#cffafe; color:#155e75; }
.party-無所属{ background:#e5e7eb; color:#374151; }
.party-不明{ background:#f3f4f6; color:#6b7280; }

.issuer-bar-wrap{
  width:140px;
  height:8px;
  background:#e5e7eb;
  border-radius:999px;
  overflow:hidden;
}

.issuer-bar{
  height:100%;
  background:
    linear-gradient(
      90deg,
      #60a5fa,
      #2563eb
    );
}

</style>
</head>

<body>

<div class="container">

<h1>国会議員 SSL / GlobalSign 調査</h1>

<div class="description">
国会議員公式サイトのHTTPS利用状況、認証局、GlobalSign証明書、
GSサイトシール利用状況を自動調査したダッシュボードです。
</div>

<div class="summary">

  <div class="card">
    <div class="card-label">総議員数</div>
    <div class="card-value" id="total">-</div>
  </div>

  <div class="card">
    <div class="card-label">SSL利用数</div>
    <div class="card-value" id="sslCount">-</div>
    <div class="card-sub" id="sslRate">-</div>
  </div>

  <div class="card">
    <div class="card-label">GlobalSign利用数</div>
    <div class="card-value" id="gsCount">-</div>
    <div class="card-sub">
      HTTPS利用サイト全体母数
    </div>
  </div>

  <div class="card">
    <div class="card-label">主要4党 GSシェア</div>
    <div class="card-value" id="gsShare">-</div>
    <div class="card-sub">
      対象母数：自民・国民・立憲・れ新 のSSL利用サイト内シェア
    </div>
  </div>

  <div class="card">
    <div class="card-label">GSサイトシール</div>
    <div class="card-value" id="sealCount">-</div>
  </div>

</div>

<div class="section">

<h2>認証局 シェア</h2>

<div class="description">
HTTPS利用サイト全体を母数として、各認証局のシェアを集計しています。
</div>

<div class="table-wrap">

<table>
<thead>
<tr>
<th>認証局</th>
<th>件数</th>
<th>シェア</th>
<th>割合</th>
</tr>
</thead>

<tbody id="issuerBody"></tbody>
</table>

</div>

</div>

<div class="section">

<h2>議員一覧</h2>

<div class="controls">

<input
  id="searchInput"
  type="text"
  placeholder="名前・政党・URL検索"
/>

<select id="houseFilter">
<option value="">すべての院</option>
<option value="衆議院">衆議院</option>
<option value="参議院">参議院</option>
</select>

<select id="sealFilter">
<option value="">シールすべて</option>
<option value="true">シールあり</option>
<option value="false">シールなし</option>
</select>

<button id="reloadBtn">更新</button>

</div>

<div class="table-wrap">

<table>
<thead>
<tr>
<th>院</th>
<th>政党</th>
<th>氏名</th>
<th>公式サイト</th>
<th>CA</th>
<th>シール有無</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

</div>

</div>

</div>

<script>

let allData = [];

const partyOrder = {
  "自民": 1,
  "国民": 2,
  "立憲": 3,
  "れ新": 4,
  "維新": 5,
  "公明": 6,
  "共産": 7,
  "参政": 8,
  "社民": 9,
  "保守": 10,
  "みらい": 11,
  "無所属": 12,
  "不明": 999
};

const escapeHtml = (str) => {

  return String(str ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
};

const badge = (v) => {

  if(v === true){
    return `
      <span class="badge yes">
        あり
      </span>
    `;
  }

  return `
    <span class="badge no">
      なし
    </span>
  `;
};

const link = (url) => {

  if(!url){
    return "-";
  }

  return `
    <a
      href="${escapeHtml(url)}"
      target="_blank"
    >
      ${escapeHtml(url)}
    </a>
  `;
};

const simplifyIssuer = (issuer) => {

  if(!issuer){
    return "不明";
  }

  const s = issuer.toLowerCase();

  if(s.includes("globalsign")) return "GlobalSign";
  if(s.includes("let's encrypt")) return "Let's Encrypt";
  if(s.includes("google trust")) return "Google Trust";
  if(s.includes("jprs")) return "JPRS";
  if(s.includes("digicert")) return "DigiCert";
  if(s.includes("amazon")) return "Amazon";
  if(s.includes("cybertrust")) return "Cybertrust";
  if(s.includes("cloudsecure")) return "CloudSecure";
  if(s.includes("sectigo")) return "Sectigo";
  if(s.includes("gehirn")) return "Gehirn";
  if(s.includes("fujissl")) return "FujiSSL";
  if(s.includes("godaddy")) return "GoDaddy";
  if(s.includes("secom")) return "SECOM";

  return issuer;
};

const updateSummary = (data) => {

  const total =
    data.length;

  const sslRows =
    data.filter(x => x.https === true);

  const sslCount =
    sslRows.length;

  const gsCount =
    sslRows.filter(
      x => simplifyIssuer(x.issuer) === "GlobalSign"
    ).length;

  const sealCount =
    data.filter(
      x => x.gs_seal === true
    ).length;

  const sslRate =
    total
      ? ((sslCount / total) * 100).toFixed(1)
      : "0.0";

  const targetParties = [
    "自民",
    "国民",
    "立憲",
    "れ新"
  ];

  const targetSsl =
    sslRows.filter(
      x => targetParties.includes(x.party)
    );

  const targetGs =
    targetSsl.filter(
      x => simplifyIssuer(x.issuer) === "GlobalSign"
    );

  const gsShare =
    targetSsl.length
      ? ((targetGs.length / targetSsl.length) * 100).toFixed(1)
      : "0.0";

  document.getElementById("total").textContent =
    total;

  document.getElementById("sslCount").textContent =
    sslCount;

  document.getElementById("sslRate").textContent =
    `SSL利用率 ${sslRate}%`;

  document.getElementById("gsCount").textContent =
    gsCount;

  document.getElementById("gsShare").textContent =
    `${gsShare}%`;

  document.getElementById("sealCount").textContent =
    sealCount;
};

const renderIssuerStats = (data) => {

  const issuerMap = {};

  const sslRows =
    data.filter(x => x.https === true);

  for(const row of sslRows){

    const issuer =
      simplifyIssuer(row.issuer);

    issuerMap[issuer] ??= 0;
    issuerMap[issuer]++;
  }

  const groupedMap = {};

  for(const [issuer,count] of Object.entries(issuerMap)){

    if(count <= 1){
      groupedMap["その他"] ??= 0;
      groupedMap["その他"] += count;
    }else{
      groupedMap[issuer] = count;
    }
  }

  const html =
    Object.entries(groupedMap)

      .sort((a,b)=>b[1]-a[1])

      .map(([issuer,count]) => {

        const share =
          sslRows.length
            ? ((count / sslRows.length) * 100).toFixed(1)
            : "0.0";

        const cls =
          issuer === "GlobalSign"
            ? "highlight"
            : "";

        return `
          <tr>

            <td class="${cls}">
              ${escapeHtml(issuer)}
            </td>

            <td>${count}</td>

            <td>${share}%</td>

            <td>
              <div class="issuer-bar-wrap">
                <div
                  class="issuer-bar"
                  style="width:${share}%"
                ></div>
              </div>
            </td>

          </tr>
        `;
      })

      .join("");

  document.getElementById("issuerBody").innerHTML =
    html;
};

const renderTable = (data) => {

  const sortedData =
    [...data].sort((a,b) => {

      const pa =
        partyOrder[a.party] || 999;

      const pb =
        partyOrder[b.party] || 999;

      if(pa !== pb){
        return pa - pb;
      }

      return String(a.name || "")
        .localeCompare(
          String(b.name || ""),
          "ja"
        );
    });

  const html =
    sortedData.map(row => {

      return `
        <tr>

          <td>${escapeHtml(row.house)}</td>

          <td>
            <span class="
              party-badge
              party-${escapeHtml(row.party || "不明")}
            ">
              ${escapeHtml(row.party || "-")}
            </span>
          </td>

          <td>
            <strong>
              ${escapeHtml(row.name)}
            </strong>
          </td>

          <td>${link(row.official)}</td>

          <td>
            ${escapeHtml(
              simplifyIssuer(row.issuer)
            )}
          </td>

          <td>${badge(row.gs_seal)}</td>

        </tr>
      `;
    })

    .join("");

  document.getElementById("tbody").innerHTML =
    html;
};

const getFilteredData = () => {

  const keyword =
    document
      .getElementById("searchInput")
      .value
      .toLowerCase();

  const house =
    document
      .getElementById("houseFilter")
      .value;

  const seal =
    document
      .getElementById("sealFilter")
      .value;

  return allData.filter(row => {

    const text = [
      row.name,
      row.party,
      row.official,
      row.issuer
    ]
      .join(" ")
      .toLowerCase();

    if(keyword && !text.includes(keyword)){
      return false;
    }

    if(house && row.house !== house){
      return false;
    }

    if(seal && String(row.gs_seal) !== seal){
      return false;
    }

    return true;
  });
};

const render = () => {

  const data =
    getFilteredData();

  updateSummary(data);

  renderIssuerStats(data);

  renderTable(data);
};

const reloadData = async () => {

  const btn =
    document.getElementById("reloadBtn");

  btn.disabled = true;
  btn.textContent = "更新中...";

  try{

    const res =
      await fetch(
        "./data.json?ts=" + Date.now()
      );

    allData =
      await res.json();

    render();

  }finally{

    btn.disabled = false;
    btn.textContent = "更新";
  }
};

const setupEvents = () => {

  for(const id of [
    "searchInput",
    "houseFilter",
    "sealFilter"
  ]){

    document
      .getElementById(id)
      .addEventListener("input", render);

    document
      .getElementById(id)
      .addEventListener("change", render);
  }

  document
    .getElementById("reloadBtn")
    .addEventListener("click", reloadData);
};

const main = async () => {

  const res =
    await fetch(
      "./data.json?ts=" + Date.now()
    );

  allData =
    await res.json();

  setupEvents();

  render();
};

main();

</script>

</body>
</html>
