<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Dai Surf Report</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a1f33;
  color: white;
}

/* ヘッダー */
.header {
  background: #0d3b66;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

/* カード */
.card {
  background: #112f4a;
  margin: 15px;
  padding: 20px;
  border-radius: 10px;
}

/* ボタン */
button {
  padding: 10px 20px;
  background: #ffcc00;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* 波グラフィック */
.wave-box {
  margin-top: 20px;
  height: 120px;
  position: relative;
  overflow: hidden;
}

.wave {
  position: absolute;
  width: 200%;
  background: rgba(255,255,255,0.5);
  border-radius: 40%;
}

.small { height: 40px; }
.medium { height: 80px; }
.big { height: 120px; }

@keyframes move {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* グリッド */
.grid {
  display: flex;
  justify-content: space-around;
  margin-top: 10px;
}

.item {
  text-align: center;
}
</style>
</head>

<body>

<div class="header">🏄 Dai Surf Report - Pererenan</div>

<div class="card">
  <h2>今日の波</h2>
  <button onclick="generate()">更新</button>

  <div class="wave-box">
    <div id="wave" class="wave"></div>
  </div>

  <p id="size"></p>
  <p id="comment"></p>
</div>

<div class="card">
  <h2>コンディション</h2>
  <div class="grid">
    <div class="item">
      🌬 風<br><span id="wind"></span>
    </div>
    <div class="item">
      🌊 サイズ<br><span id="size2"></span>
    </div>
    <div class="item">
      👍 評価<br><span id="rate"></span>
    </div>
  </div>
</div>

<script>
function generate() {
  const wave = document.getElementById("wave");

  const patterns = [
    {
      size: "腰〜腹",
      class: "small",
      wind: "オフショア",
      rate: "△",
      comment: "ちょっと物足りない"
    },
    {
      size: "胸〜肩",
      class: "medium",
      wind: "弱オフ",
      rate: "○",
      comment: "ファンウェーブ！"
    },
    {
      size: "頭〜頭オーバー",
      class: "big",
      wind: "サイドオフ",
      rate: "◎",
      comment: "最高コンディション🔥"
    }
  ];

  const p = patterns[Math.floor(Math.random()*patterns.length)];

  wave.className = "wave " + p.class;
  wave.style.animation = "move 3s infinite linear";

  document.getElementById("size").innerText = "サイズ：" + p.size;
  document.getElementById("size2").innerText = p.size;
  document.getElementById("wind").innerText = p.wind;
  document.getElementById("rate").innerText = p.rate;
  document.getElementById("comment").innerText = p.comment;
}
</script>

</body>
</html>
