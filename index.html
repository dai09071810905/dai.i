<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>国会議員サイト証明書ダッシュボード</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root{--bg:#0b1020;--bg2:#0f1730;--card:#151b2f;--line:#2b3758;--text:#eef3ff;--muted:#aeb9d6;--accent:#4da3ff;--ok:#1fbf75;--bad:#ff6b6b}
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(180deg,var(--bg),var(--bg2) 40%,var(--bg));color:var(--text)}
    .wrap{max-width:1500px;margin:0 auto;padding:24px}.hero{display:flex;gap:16px;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;margin-bottom:18px}.title{font-size:28px;font-weight:800}.sub,.small,.muted{color:var(--muted)}.sub{margin-top:8px;line-height:1.7;max-width:980px}.small{font-size:12px;margin-top:8px}.btn{background:var(--accent);color:white;border:none;border-radius:12px;padding:12px 18px;font-weight:800;cursor:pointer;box-shadow:0 6px 18px rgba(77,163,255,.25)}.btn.secondary{background:#1c2747;box-shadow:none;border:1px solid var(--line)}.actions{display:flex;gap:10px;flex-wrap:wrap}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin:18px 0 22px}.card{background:rgba(21,27,47,.92);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,.22)}.label{color:var(--muted);font-size:13px;line-height:1.4}.metric{font-size:30px;font-weight:900;margin-top:6px}.section-title{font-size:20px;font-weight:800;margin:28px 0 12px}.toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin:12px 0}input,select{background:#121a30;border:1px solid var(--line);color:var(--text);padding:10px 12px;border-radius:10px}table{width:100%;border-collapse:collapse;background:rgba(21,27,47,.92);border:1px solid var(--line);border-radius:18px;overflow:hidden}th,td{padding:10px 12px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:top}th{background:#1a2240;text-align:left;position:sticky;top:0}tr:hover td{background:rgba(255,255,255,.03)}.pill{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px;font-weight:800;white-space:nowrap}.ok{background:rgba(31,191,117,.15);color:#6ff0aa}.bad{background:rgba(255,107,107,.14);color:#ff9f9f}.note{background:#11192f;border:1px solid var(--line);padding:14px 16px;border-radius:16px;color:var(--muted);line-height:1.7}a{color:#92c5ff}@media(max-width:1100px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:640px){.grid{grid-template-columns:1fr}.title{font-size:22px}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div>
      <div class="title">国会議員サイト証明書ダッシュボード</div>
      <div class="sub">現職国会議員の公式サイト候補をもとに、HTTPS導入、GlobalSign証明書、サイトシール掲載を集計します。</div>
      <div class="small" id="generatedAt">最終更新: -</div>
    </div>
    <div class="actions"><button class="btn" id="reloadBtn">最新データを再読み込み</button><button class="btn secondary" id="openDataBtn">data.jsonを開く</button></div>
  </div>
  <div class="note">GSシェアの母数は「自由民主党・立憲民主党・れいわ新選組・国民民主党」所属かつHTTPS導入サイトです。党別集計とプルダウンは、指定5党＋その他に集約します。</div>
  <div class="grid" id="summaryGrid"></div>
  <div class="section-title">院別集計</div><div id="chamberTable"></div>
  <div class="section-title">党別集計</div><div id="partyTable"></div>
  <div class="section-title">議員別明細</div>
  <div class="toolbar"><input id="searchBox" placeholder="名前・党名・URL・発行者で検索"><select id="partySelect"><option value="all">政党：すべて</option></select><select id="filterBox"><option value="all">状態：すべて</option><option value="https">HTTPSあり</option><option value="gs_any">GlobalSign証明書のみ</option><option value="seal">サイトシールあり</option><option value="no_site">サイト未取得</option></select></div>
  <div id="detailTable"></div>
</div>
<script>
let DATA={summary:{by_party:[],by_chamber:[],display_parties:[]},results:[]};
const yen=v=>v??0, pct=v=>`${v??0}%`, safe=v=>(v===null||v===undefined||v==="")?"-":String(v);
function pill(flag,yes,no){return flag?`<span class="pill ok">${yes}</span>`:`<span class="pill bad">${no}</span>`}
function renderSummary(s){const items=[["現職議員数 合計",yen(s.total_members)],["現職議員数 衆議院",yen((s.by_chamber||[]).find(r=>r.chamber==="衆議院")?.total)],["現職議員数 参議院",yen((s.by_chamber||[]).find(r=>r.chamber==="参議院")?.total)],["サイト取得数",yen(s.with_site)],["HTTPSサイト数",yen(s.https_count)],["GS証明書数 合計",yen(s.gs_count)],["GSシェア",`${pct(s.gs_share_target_parties)} (${yen(s.gs_share_target_parties_numerator)}/${yen(s.gs_share_target_parties_denominator)})`],["サイトシール掲載率",`${pct(s.site_seal_share_gs_legislator_cert)} (${yen(s.site_seal_share_gs_legislator_cert_numerator)}/${yen(s.site_seal_share_gs_legislator_cert_denominator)})`],["サイトシール数",yen(s.site_seal_count)]];summaryGrid.innerHTML=items.map(([l,v])=>`<div class="card"><div class="label">${l}</div><div class="metric">${v}</div></div>`).join("")}
function table(headers,rows){return `<table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${rows}</tbody></table>`}
function renderChamberTable(rows){chamberTable.innerHTML=table(["院","現職議員数","サイト取得","HTTPS","GS証明書","GSシェア","サイトシール"],(rows||[]).map(r=>`<tr><td>${safe(r.chamber)}</td><td>${yen(r.total)}</td><td>${yen(r.with_site)}</td><td>${yen(r.https)}</td><td>${yen(r.gs)}</td><td>${pct(r.gs_share)}</td><td>${yen(r.seal)}</td></tr>`).join(""))}
function renderPartyTable(rows){partyTable.innerHTML=table(["党名","現職議員数","サイト取得","HTTPS","GS証明書","GSシェア","サイトシール"],(rows||[]).map(r=>`<tr><td>${safe(r.party)}</td><td>${yen(r.total)}</td><td>${yen(r.with_site)}</td><td>${yen(r.https)}</td><td>${yen(r.gs)}</td><td>${pct(r.gs_share)}</td><td>${yen(r.seal)}</td></tr>`).join(""))}
function renderPartySelect(){const select=partySelect,current=select.value;const parties=(DATA.summary?.display_parties||DATA.summary?.by_party?.map(r=>r.party)||[]).filter(Boolean);select.innerHTML=`<option value="all">政党：すべて</option>`+parties.map(p=>`<option value="${p}">${p}</option>`).join("");if(parties.includes(current))select.value=current}
function filteredResults(){const q=searchBox.value.trim().toLowerCase(), filter=filterBox.value, p=partySelect.value;return (DATA.results||[]).filter(r=>{if(p!=="all"&&(r.party_group||r.party)!==p)return false;const hit=!q||[r.name,r.party,r.party_group,r.chamber,r.official_url,r.final_url,r.cert_subject_o,r.cert_issuer_o,r.cert_issuer_cn,r.official_url_source].filter(Boolean).join(" ").toLowerCase().includes(q);if(!hit)return false;if(filter==="https")return !!r.is_https;if(filter==="gs_any")return !!r.is_gs;if(filter==="seal")return !!r.site_seal_found;if(filter==="no_site")return !r.official_url;return true})}
function renderDetailTable(){const rows=filteredResults();detailTable.innerHTML=table(["院","氏名","党","集計区分","サイト","HTTPS","GS","サイトシール","Subject O","Issuer","URL取得元","備考"],rows.map(r=>{const u=r.final_url||r.official_url;const site=u?`<a href="${u}" target="_blank" rel="noopener">公式サイト</a>`:`<span class="muted">-</span>`;const issuer=[r.cert_issuer_o,r.cert_issuer_cn].filter(Boolean).join(" / ")||"-";const notes=Array.isArray(r.notes)&&r.notes.length?r.notes.join("<br>"):"-";return `<tr><td>${safe(r.chamber)}</td><td>${safe(r.name)}</td><td>${safe(r.party)}</td><td>${safe(r.party_group)}</td><td>${site}</td><td>${pill(r.is_https,"HTTPS","なし")}</td><td>${pill(r.is_gs,"GS","非GS")}</td><td>${pill(r.site_seal_found,"あり","なし")}</td><td>${safe(r.cert_subject_o)}</td><td>${issuer}</td><td>${safe(r.official_url_source)}</td><td>${notes}</td></tr>`}).join(""))}
async function loadData(){const res=await fetch(`./data.json?t=${Date.now()}`,{cache:"no-store"});if(!res.ok)throw new Error(`data.json の読み込みに失敗: ${res.status}`);DATA=await res.json();generatedAt.textContent=`最終更新: ${DATA.summary?.generated_at||DATA.generated_at||"-"}`;renderSummary(DATA.summary||{});renderChamberTable(DATA.summary?.by_chamber||[]);renderPartyTable(DATA.summary?.by_party||[]);renderPartySelect();renderDetailTable()}
reloadBtn.addEventListener("click",async()=>{try{await loadData();alert("最新の data.json を再読み込みしました。")}catch(e){alert(e.message)}});openDataBtn.addEventListener("click",()=>window.open("./data.json","_blank"));searchBox.addEventListener("input",renderDetailTable);filterBox.addEventListener("change",renderDetailTable);partySelect.addEventListener("change",renderDetailTable);loadData().catch(err=>{summaryGrid.innerHTML=`<div class="card" style="grid-column:1/-1"><div class="label">エラー</div><div style="margin-top:8px">${err.message}</div><div class="small" style="margin-top:8px">同じフォルダに data.json を置いてください。</div></div>`});
</script>
</body>
</html>
