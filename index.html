<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>国会議員サイト証明書ダッシュボード</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <h1>国会議員サイト証明書ダッシュボード</h1>
  <p id="updated">最終更新: -</p>
  <button onclick="loadData()">最新 data.json を再読込</button>
  <pre id="out">loading...</pre>

  <script>
    async function loadData() {
      const res = await fetch('./data.json?t=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error('data.json の読み込み失敗: ' + res.status);
      const data = await res.json();
      document.getElementById('updated').textContent =
        '最終更新: ' + (data.summary?.generated_at || data.generated_at || '-');
      document.getElementById('out').textContent =
        JSON.stringify(data.summary || data, null, 2);
    }

    loadData().catch(err => {
      document.getElementById('out').textContent = String(err);
    });
  </script>
</body>
</html>
