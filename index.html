<script>

let allData = [];

const partyOrder = {
  "自民": 1,
  "国民": 2,
  "立憲": 3,
  "れ新": 4,
  "維新": 5,
  "公明": 6,
  "共産": 7,
  "参政": 8,
  "社民": 9,
  "保守": 10,
  "みらい": 11,
  "無所属": 12,
  "不明": 999
};

const donationParties = [
  "自民",
  "国民",
  "立憲",
  "れ新"
];

const escapeHtml = (str) => {
  return String(str ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
};

const badge = (v) => {
  if(v === true){
    return `<span class="badge yes">あり</span>`;
  }

  return `<span class="badge no">なし</span>`;
};

const link = (url) => {
  if(!url){
    return "-";
  }

  return `
    <a href="${escapeHtml(url)}" target="_blank">
      ${escapeHtml(url)}
    </a>
  `;
};

const simplifyIssuer = (issuer) => {

  if(!issuer){
    return "不明";
  }

  const s = issuer.toLowerCase();

  if(s.includes("globalsign")) return "GlobalSign";
  if(s.includes("let's encrypt")) return "Let's Encrypt";
  if(s.includes("google trust")) return "Google Trust";
  if(s.includes("jprs")) return "JPRS";
  if(s.includes("digicert")) return "DigiCert";
  if(s.includes("amazon")) return "Amazon";
  if(s.includes("cybertrust")) return "Cybertrust";
  if(s.includes("cloudsecure")) return "CloudSecure";
  if(s.includes("sectigo")) return "Sectigo";
  if(s.includes("gehirn")) return "Gehirn";
  if(s.includes("fujissl")) return "FujiSSL";
  if(s.includes("godaddy")) return "GoDaddy";
  if(s.includes("secom")) return "SECOM";

  return issuer;
};

const isGlobalSign = (row) => {
  return simplifyIssuer(row.issuer) === "GlobalSign";
};

const updateSummary = (data) => {

  const total =
    data.length;

  // URLあり + HTTPSあり + CA不明除外
  const sslRows =
    data.filter(
      x =>
        x.https === true &&
        x.official &&
        simplifyIssuer(x.issuer) !== "不明"
    );

  const sslCount =
    sslRows.length;

  const gsCount =
    sslRows.filter(
      x => isGlobalSign(x)
    ).length;

  const sealCount =
    data.filter(
      x => x.gs_seal === true
    ).length;

  const sslRate =
    total
      ? ((sslCount / total) * 100).toFixed(1)
      : "0.0";

  // 寄付4党のみ
  const donationSsl =
    sslRows.filter(
      x =>
        donationParties.includes(x.party)
    );

  const donationGs =
    donationSsl.filter(
      x => isGlobalSign(x)
    );

  const gsShare =
    donationSsl.length
      ? (
          (donationGs.length / donationSsl.length)
          * 100
        ).toFixed(1)
      : "0.0";

  document.getElementById("total").textContent =
    total;

  document.getElementById("sslCount").textContent =
    sslCount;

  document.getElementById("sslRate").textContent =
    `SSL利用率 ${sslRate}%`;

  document.getElementById("gsCount").textContent =
    gsCount;

  document.getElementById("sealCount").textContent =
    sealCount;

  document.getElementById("donationSslCount").textContent =
    donationSsl.length;

  document.getElementById("donationGsCount").textContent =
    donationGs.length;

  document.getElementById("gsShare").textContent =
    `${gsShare}%`;
};

const renderIssuerStats = (data) => {

  const issuerMap = {};

  const sslRows =
    data.filter(
      x =>
        x.https === true &&
        x.official &&
        simplifyIssuer(x.issuer) !== "不明"
    );

  for(const row of sslRows){

    const issuer =
      simplifyIssuer(row.issuer);

    issuerMap[issuer] ??= 0;
    issuerMap[issuer]++;
  }

  const groupedMap = {};

  for(const [issuer,count] of Object.entries(issuerMap)){

    if(count <= 2){

      groupedMap["その他"] ??= 0;
      groupedMap["その他"] += count;

    }else{

      groupedMap[issuer] = count;
    }
  }

  const html =
    Object.entries(groupedMap)

      .sort((a,b)=>b[1]-a[1])

      .map(([issuer,count]) => {

        const share =
          sslRows.length
            ? ((count / sslRows.length) * 100).toFixed(1)
            : "0.0";

        const cls =
          issuer === "GlobalSign"
            ? "highlight"
            : "";

        return `
          <tr>
            <td class="${cls}">
              ${escapeHtml(issuer)}
            </td>

            <td>${count}</td>

            <td>${share}%</td>

            <td>
              <div class="issuer-bar-wrap">
                <div
                  class="issuer-bar"
                  style="width:${share}%"
                ></div>
              </div>
            </td>
          </tr>
        `;
      })

      .join("");

  document.getElementById("issuerBody").innerHTML =
    html;
};

const renderPartyGsStats = (data) => {

  const partyMap = {};

  for(const row of data){

    if(
      !row.official ||
      simplifyIssuer(row.issuer) === "不明"
    ){
      continue;
    }

    const party =
      row.party || "不明";

    partyMap[party] ??= {
      total: 0,
      ssl: 0,
      gs: 0
    };

    partyMap[party].total++;

    if(row.https === true){

      partyMap[party].ssl++;

      if(isGlobalSign(row)){
        partyMap[party].gs++;
      }
    }
  }

  const html =
    Object.entries(partyMap)

      .sort((a,b) => {

        const pa =
          partyOrder[a[0]] || 999;

        const pb =
          partyOrder[b[0]] || 999;

        return pa - pb;
      })

      .map(([party,stats]) => {

        const share =
          stats.ssl
            ? ((stats.gs / stats.ssl) * 100).toFixed(1)
            : "0.0";

        return `
          <tr>

            <td>
              <span class="
                party-badge
                party-${escapeHtml(party)}
              ">
                ${escapeHtml(party)}
              </span>
            </td>

            <td>${stats.total}</td>

            <td>${stats.ssl}</td>

            <td>${stats.gs}</td>

            <td>
              <strong>${share}%</strong>
            </td>

          </tr>
        `;
      })

      .join("");

  document.getElementById("partyGsBody").innerHTML =
    html;
};

const renderTable = (data) => {

  const sortedData =
    [...data].sort((a,b) => {

      const pa =
        partyOrder[a.party] || 999;

      const pb =
        partyOrder[b.party] || 999;

      if(pa !== pb){
        return pa - pb;
      }

      return String(a.name || "")
        .localeCompare(
          String(b.name || ""),
          "ja"
        );
    });

  const html =
    sortedData.map(row => {

      return `
        <tr>

          <td>${escapeHtml(row.house)}</td>

          <td>
            <span class="
              party-badge
              party-${escapeHtml(row.party || "不明")}
            ">
              ${escapeHtml(row.party || "-")}
            </span>
          </td>

          <td>
            <strong>
              ${escapeHtml(row.name)}
            </strong>
          </td>

          <td>${link(row.official)}</td>

          <td>
            ${escapeHtml(
              simplifyIssuer(row.issuer)
            )}
          </td>

          <td>${badge(row.gs_seal)}</td>

        </tr>
      `;
    })

    .join("");

  document.getElementById("tbody").innerHTML =
    html;
};

const getFilteredData = () => {

  const keyword =
    document
      .getElementById("searchInput")
      .value
      .toLowerCase();

  const house =
    document
      .getElementById("houseFilter")
      .value;

  const seal =
    document
      .getElementById("sealFilter")
      .value;

  return allData.filter(row => {

    const text = [
      row.name,
      row.party,
      row.official,
      row.issuer
    ]
      .join(" ")
      .toLowerCase();

    if(keyword && !text.includes(keyword)){
      return false;
    }

    if(house && row.house !== house){
      return false;
    }

    if(seal && String(row.gs_seal) !== seal){
      return false;
    }

    return true;
  });
};

const render = () => {

  const data =
    getFilteredData();

  updateSummary(data);
  renderIssuerStats(data);
  renderPartyGsStats(data);
  renderTable(data);
};

const reloadData = async () => {

  const btn =
    document.getElementById("reloadBtn");

  btn.disabled = true;
  btn.textContent = "更新中...";

  try{

    const res =
      await fetch(
        "./data.json?ts=" + Date.now()
      );

    allData =
      await res.json();

    render();

  }finally{

    btn.disabled = false;
    btn.textContent = "更新";
  }
};

const setupEvents = () => {

  for(const id of [
    "searchInput",
    "houseFilter",
    "sealFilter"
  ]){

    document
      .getElementById(id)
      .addEventListener("input", render);

    document
      .getElementById(id)
      .addEventListener("change", render);
  }

  document
    .getElementById("reloadBtn")
    .addEventListener("click", reloadData);
};

const main = async () => {

  const res =
    await fetch(
      "./data.json?ts=" + Date.now()
    );

  allData =
    await res.json();

  setupEvents();

  render();
};

main();

</script>
