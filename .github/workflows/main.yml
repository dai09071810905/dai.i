name: Update Diet Member SSL Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * 0"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect official URLs from Wikipedia
        run: |
          python collect_urls.py

      - name: Scan SSL certificates and GlobalSign seal
        run: |
          python scan_ssl.py

      - name: Commit updated JSON files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add urls.json data.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Diet member SSL data"
            git push
          fi
