name: Update and Deploy Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          pip install \
            beautifulsoup4 \
            requests \
            pandas \
            openpyxl \
            cryptography \
            pyopenssl

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Check files
        run: |
          ls -la
          test -f members.xlsx
          test -f collect_urls.py
          test -f scan_ssl.py
          test -f index.html

      - name: Collect official URLs
        run: |
          python collect_urls.py

      - name: Show urls.json count
        run: |
          python - <<'PY'
          import json

          data = json.load(open("urls.json", encoding="utf-8"))

          print("urls.json count:", len(data))
          print(data[:3])
          PY

      - name: Scan SSL certificates
        run: |
          python scan_ssl.py

      - name: Show data.json count
        run: |
          python - <<'PY'
          import json
          import sys

          data = json.load(open("data.json", encoding="utf-8"))

          print("data.json count:", len(data))
          print(data[:3])

          if len(data) == 0:
              sys.exit("ERROR: data.json is empty")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
