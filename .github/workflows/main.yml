#!/usr/bin/env python3
# -*- coding: utf-8 -*-
from __future__ import annotations
import concurrent.futures, datetime as dt, json, re, socket, ssl
from dataclasses import dataclass, asdict
from pathlib import Path
from typing import Dict, List, Optional, Tuple
from urllib.parse import urlparse
import requests
from bs4 import BeautifulSoup

OUT_FILE = Path("data.json")
USER_AGENT = "DietCertDashboard/1.0 (+GitHub Actions)"
TIMEOUT = 20
MAX_ENRICH_WORKERS = 12
MAX_SCAN_WORKERS = 20
HEADERS = {"User-Agent": USER_AGENT}
session = requests.Session()
session.headers.update(HEADERS)
GS_KEYWORDS = ["globalsign", "global sign", "gmo globalsign"]
SITE_SEAL_PATTERNS = [r"globalsign", r"siteseal", r"sslpr", r"secure site seal", r"実在証明・盗聴対策シール"]
PARTY_NORMALIZATION = {
    "自民":"自由民主党","自由民主":"自由民主党","自由民主党":"自由民主党",
    "立民":"立憲民主党","立憲":"立憲民主党","立憲民主":"立憲民主党","立憲民主党":"立憲民主党",
    "維新":"日本維新の会","日本維新":"日本維新の会","日本維新の会":"日本維新の会",
    "公明":"公明党","公明党":"公明党",
    "国民":"国民民主党","国民民主":"国民民主党","国民民主党":"国民民主党",
    "共産":"日本共産党","日本共産":"日本共産党","日本共産党":"日本共産党",
    "れいわ":"れいわ新選組","れいわ新選組":"れいわ新選組",
    "参政":"参政党","参政党":"参政党",
    "社民":"社会民主党","社会民主党":"社会民主党",
    "保守":"日本保守党","日本保守党":"日本保守党",
    "無所属":"無所属","無":"無所属",
}
@dataclass
class Member:
    chamber:str; name:str; party:str
    wikipedia_title:Optional[str]=None; wikipedia_url:Optional[str]=None; official_url:Optional[str]=None
@dataclass
class ScanResult:
    chamber:str; name:str; party:str; wikipedia_title:Optional[str]; source_url:Optional[str]; official_url:Optional[str]; final_url:Optional[str]
    status:str; http_status:Optional[int]; cert_subject_cn:Optional[str]; cert_subject_o:Optional[str]
    cert_issuer_o:Optional[str]; cert_issuer_cn:Optional[str]; is_https:bool; is_gs:bool; is_gs_legislator_cert:bool; site_seal_found:bool; notes:List[str]
def now_iso()->str: return dt.datetime.now(dt.timezone.utc).isoformat(timespec="seconds")
def get_text(url:str)->Optional[str]:
    try:
        r=session.get(url,timeout=TIMEOUT); r.raise_for_status()
        if not r.encoding: r.encoding=r.apparent_encoding
        return r.text
    except Exception: return None
def normalize_party(value:str)->str:
    if not value: return ""
    value=value.strip(); compact=re.sub(r"\s+","",value); compact=re.split(r"[／/・]",compact)[0]
    return PARTY_NORMALIZATION.get(compact,value)
def clean_name(name:str)->str:
    name=name.replace("　"," ").strip(); name=re.sub(r"[君氏]+$","",name).strip(); return name
def clean_url(url:Optional[str])->Optional[str]:
    if not url: return None
    url=url.strip()
    if url.startswith("//"): url="https:"+url
    if not re.match(r"^https?://",url,re.I): url="https://"+url
    parsed=urlparse(url)
    return url if parsed.netloc else None
def get_shugiin_members()->List[Member]:
    urls=[f"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/syu/{i}giin.htm" for i in range(1,7)]
    members=[]; pattern=re.compile(r"([^\s,]+(?:\s+[^\s,]+)*)君,\s*([^\s<.。]+)")
    for url in urls:
        text=get_text(url)
        if not text: continue
        for m in pattern.finditer(text):
            name=clean_name(m.group(1)); party=normalize_party(m.group(2))
            if name: members.append(Member(chamber="衆議院",name=name,party=party))
    return list({(m.chamber,m.name):m for m in members}.values())
def get_sangiin_members()->List[Member]:
    html=get_text("https://www.sangiin.go.jp/japanese/joho1/kousei/giin/current/giin.htm")
    if not html: return []
    soup=BeautifulSoup(html,"html.parser")
    lines=[re.sub(r"\s+"," ",line).strip() for line in soup.get_text("\n").splitlines()]
    lines=[line for line in lines if line]
    party_names=sorted(set(PARTY_NORMALIZATION.values()), key=len, reverse=True)
    members=[]
    for i,line in enumerate(lines):
        if len(line)>30: continue
        if not re.fullmatch(r"[一-龥々〆ヵヶぁ-んァ-ンー]+\s?[一-龥々〆ヵヶぁ-んァ-ンー]+",line): continue
        window=" ".join(lines[i+1:i+7]); party=""
        for p in party_names:
            if p in window: party=p; break
        if party: members.append(Member(chamber="参議院",name=line,party=party))
    return list({(m.chamber,m.name):m for m in members}.values())
def search_wikipedia(name:str,chamber:str)->Tuple[Optional[str],Optional[str]]:
    api="https://ja.wikipedia.org/w/api.php"
    for q in [f"{name} (政治家)",f"{name} {chamber}",name]:
        try:
            r=session.get(api,params={"action":"query","list":"search","format":"json","srsearch":q,"srlimit":5},timeout=TIMEOUT)
            r.raise_for_status(); items=r.json().get("query",{}).get("search",[])
        except Exception: continue
        for item in items:
            title=item.get("title")
            if title and (name.replace(" ","") in title.replace(" ","") or title.startswith(name)):
                return title,f"https://ja.wikipedia.org/wiki/{requests.utils.quote(title.replace(' ','_'))}"
    return None,None
def get_wikidata_qid(title:str)->Optional[str]:
    try:
        r=session.get("https://ja.wikipedia.org/w/api.php",params={"action":"query","prop":"pageprops","titles":title,"format":"json"},timeout=TIMEOUT)
        r.raise_for_status(); pages=r.json().get("query",{}).get("pages",{})
        for page in pages.values():
            qid=page.get("pageprops",{}).get("wikibase_item")
            if qid: return qid
    except Exception: return None
    return None
def get_official_website_from_wikidata(qid:str)->Optional[str]:
    try:
        r=session.get(f"https://www.wikidata.org/wiki/Special:EntityData/{qid}.json",timeout=TIMEOUT); r.raise_for_status()
        claims=r.json().get("entities",{}).get(qid,{}).get("claims",{})
        for claim in claims.get("P856",[]):
            v=claim.get("mainsnak",{}).get("datavalue",{}).get("value")
            cleaned=clean_url(v)
            if cleaned: return cleaned
    except Exception: return None
    return None
def get_official_website_from_wikipedia(page_url:str)->Optional[str]:
    html=get_text(page_url)
    if not html: return None
    soup=BeautifulSoup(html,"html.parser")
    for table in soup.select("table.infobox, table.infobox.vevent"):
        for a in table.select("a[href]"):
            href=a.get("href","")
            if href.startswith("http"): return clean_url(href)
    for a in soup.select("a.external"):
        href=a.get("href","")
        if href.startswith("http"): return clean_url(href)
    return None
def enrich_member(member:Member)->Member:
    title,wiki_url=search_wikipedia(member.name,member.chamber); official_url=None
    if title:
        qid=get_wikidata_qid(title)
        if qid: official_url=get_official_website_from_wikidata(qid)
        if not official_url and wiki_url: official_url=get_official_website_from_wikipedia(wiki_url)
    member.wikipedia_title=title; member.wikipedia_url=wiki_url; member.official_url=official_url
    return member
def extract_cert(hostname:str,port:int=443)->Optional[dict]:
    context=ssl.create_default_context(); context.check_hostname=False; context.verify_mode=ssl.CERT_NONE
    try:
        with socket.create_connection((hostname,port),timeout=TIMEOUT) as sock:
            with context.wrap_socket(sock,server_hostname=hostname) as ssock:
                return ssock.getpeercert()
    except Exception: return None
def parse_name_tuple(name_tuple)->Dict[str,str]:
    result={}
    for rdn in name_tuple or ():
        for key,val in rdn: result[key]=val
    return result
def contains_gs(*texts:Optional[str])->bool:
    joined=" ".join(x or "" for x in texts).lower()
    return any(k in joined for k in GS_KEYWORDS)
def is_probable_gs_legislator_cert(party:str,subject_o:Optional[str],issuer_o:Optional[str],issuer_cn:Optional[str])->bool:
    if not contains_gs(issuer_o,issuer_cn): return False
    if not subject_o: return False
    p1=normalize_party(party); p2=normalize_party(subject_o)
    return p1==p2 or bool(p1 and (p1 in subject_o or subject_o in p1))
def detect_site_seal(html:str)->bool:
    hay=(html or "").lower()
    return any(re.search(p,hay,re.I) for p in SITE_SEAL_PATTERNS)
def scan_site(member:Member)->ScanResult:
    notes=[]
    if not member.official_url:
        return ScanResult(member.chamber,member.name,member.party,member.wikipedia_title,member.wikipedia_url,None,None,"site_not_found",None,None,None,None,None,False,False,False,False,["公式サイトURLを取得できませんでした"])
    url=member.official_url; parsed=urlparse(url); hostname=parsed.hostname
    cert_subject_cn=cert_subject_o=cert_issuer_o=cert_issuer_cn=None; is_https=parsed.scheme.lower()=="https"
    if is_https and hostname:
        cert=extract_cert(hostname,parsed.port or 443)
        if cert:
            subject=parse_name_tuple(cert.get("subject")); issuer=parse_name_tuple(cert.get("issuer"))
            cert_subject_cn=subject.get("commonName"); cert_subject_o=subject.get("organizationName")
            cert_issuer_o=issuer.get("organizationName"); cert_issuer_cn=issuer.get("commonName")
        else: notes.append("証明書取得に失敗")
    try:
        r=session.get(url,timeout=TIMEOUT,allow_redirects=True)
        final_url=r.url; status_code=r.status_code; html=r.text or ""; site_seal=detect_site_seal(html)
        if not is_https and final_url.lower().startswith("https://"):
            final_host=urlparse(final_url).hostname
            if final_host:
                cert=extract_cert(final_host,443)
                if cert:
                    subject=parse_name_tuple(cert.get("subject")); issuer=parse_name_tuple(cert.get("issuer"))
                    cert_subject_cn=subject.get("commonName"); cert_subject_o=subject.get("organizationName")
                    cert_issuer_o=issuer.get("organizationName"); cert_issuer_cn=issuer.get("commonName")
                    is_https=True
        is_gs=contains_gs(cert_issuer_o,cert_issuer_cn)
        is_gs_leg=is_probable_gs_legislator_cert(member.party,cert_subject_o,cert_issuer_o,cert_issuer_cn)
        return ScanResult(member.chamber,member.name,member.party,member.wikipedia_title,member.wikipedia_url,member.official_url,final_url,"ok",status_code,cert_subject_cn,cert_subject_o,cert_issuer_o,cert_issuer_cn,is_https,is_gs,is_gs_leg,site_seal,notes)
    except Exception as e:
        return ScanResult(member.chamber,member.name,member.party,member.wikipedia_title,member.wikipedia_url,member.official_url,None,"request_error",None,cert_subject_cn,cert_subject_o,cert_issuer_o,cert_issuer_cn,is_https,contains_gs(cert_issuer_o,cert_issuer_cn),is_probable_gs_legislator_cert(member.party,cert_subject_o,cert_issuer_o,cert_issuer_cn),False,notes+[f"HTTP取得失敗: {type(e).__name__}"])
def summarize(results:List[ScanResult])->dict:
    total_members=len(results); with_site=sum(1 for r in results if r.official_url); https_count=sum(1 for r in results if r.is_https)
    gs_count=sum(1 for r in results if r.is_gs); gs_legislator_count=sum(1 for r in results if r.is_gs_legislator_cert); site_seal_count=sum(1 for r in results if r.site_seal_found)
    def pct(n:int,d:int)->float: return round((n/d*100) if d else 0.0,1)
    by_party={}
    for r in results:
        party=r.party or "不明"
        by_party.setdefault(party,{"party":party,"total":0,"with_site":0,"gs_leg":0,"gs":0,"seal":0})
        by_party[party]["total"]+=1
        if r.official_url: by_party[party]["with_site"]+=1
        if r.is_gs_legislator_cert: by_party[party]["gs_leg"]+=1
        if r.is_gs: by_party[party]["gs"]+=1
        if r.site_seal_found: by_party[party]["seal"]+=1
    return {"generated_at":now_iso(),"total_members":total_members,"with_site":with_site,"https_count":https_count,"gs_count":gs_count,"gs_legislator_count":gs_legislator_count,"site_seal_count":site_seal_count,"gs_share_all_members":pct(gs_legislator_count,total_members),"gs_share_sites_only":pct(gs_legislator_count,with_site),"site_seal_share_sites_only":pct(site_seal_count,with_site),"by_party":sorted(by_party.values(), key=lambda x:(-x["with_site"],x["party"]))}
def main():
    members=get_shugiin_members()+get_sangiin_members()
    members=sorted({(m.chamber,m.name):m for m in members}.values(), key=lambda x:(x.chamber,x.name))
    print(f"Current members fetched: {len(members)}")
    enriched=[]
    with concurrent.futures.ThreadPoolExecutor(max_workers=MAX_ENRICH_WORKERS) as ex:
        futures=[ex.submit(enrich_member,m) for m in members]
        for i,f in enumerate(concurrent.futures.as_completed(futures),start=1):
            enriched.append(f.result())
            if i%25==0: print(f"Enriched {i}/{len(members)}")
    enriched=sorted(enriched,key=lambda x:(x.chamber,x.name))
    results=[]
    with concurrent.futures.ThreadPoolExecutor(max_workers=MAX_SCAN_WORKERS) as ex:
        futures=[ex.submit(scan_site,m) for m in enriched]
        for i,f in enumerate(concurrent.futures.as_completed(futures),start=1):
            results.append(f.result())
            if i%25==0: print(f"Scanned {i}/{len(enriched)}")
    results=sorted(results,key=lambda x:(x.chamber,x.name))
    payload={"generated_at":now_iso(),"summary":summarize(results),"results":[asdict(r) for r in results]}
    OUT_FILE.write_text(json.dumps(payload,ensure_ascii=False,indent=2),encoding="utf-8")
    print(f"Wrote {OUT_FILE} with {len(results)} rows")
if __name__=="__main__":
    main()
